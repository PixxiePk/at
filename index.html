<script>
        async function loadAsset() {
            const params = new URLSearchParams(window.location.search);
            const idParam = params.get('id');
            const container = document.getElementById('data-container');

            if (!idParam) {
                container.innerHTML = "<p class='empty-state'>No Asset ID found in the link.</p>";
                return;
            }

            // Clean the ID (removes spaces and makes it lowercase) but PRESERVES ALL ZEROS
            const assetId = idParam.trim().toLowerCase();

            // We look through your 10 databases
            const files = [
                'database1.json', 'database2.json', 'database3.json', 'database4.json', 
                'database5.json', 'database6.json', 'database7.json', 'database8.json', 
                'database9.json', 'database10.json'
            ];
            
            let found = false;

            for (let file of files) {
                try {
                    const res = await fetch(file + '?v=' + Date.now());
                    if (!res.ok) continue; // Skip if file doesn't exist
                    
                    const db = await res.json();
                    
                    // Search for an exact match (ignoring spaces/caps, but keeping zeros)
                    const matchedKey = Object.keys(db).find(k => String(k).trim().toLowerCase() === assetId);
                    
                    if (matchedKey) {
                        container.innerHTML = '';
                        let addedRows = false;
                        
                        for (let [k, v] of Object.entries(db[matchedKey])) {
                            if (v && String(v).trim() !== "") {
                                container.innerHTML += `<div class="data-row"><div class="label">${k}</div><div class="value">${v}</div></div>`;
                                addedRows = true;
                            }
                        }
                        
                        if (!addedRows) {
                            container.innerHTML = `<p class='empty-state'>Asset found, but all info is blank.</p>`;
                        }
                        
                        found = true;
                        break; // Stop searching once we find it
                    }
                } catch (e) { 
                    continue; 
                }
            }
            
            if (!found) {
                container.innerHTML = `<p class='empty-state'>Asset ID "<b>${idParam}</b>" not found.</p>`;
            }
        }
        
        loadAsset();
    </script>
